# ~/.tmux.conf — bdr193 dotfiles
#
# Primary goal: copy/paste that behaves like a local terminal.
# Mouse is OFF so the terminal (e.g. Ghostty) owns text selection —
# drag to select + Cmd+C copies to the system clipboard, Cmd+V pastes.
# This is the only reliable copy-to-clipboard path over mosh, which drops
# the OSC 52 escape tmux would otherwise use to set the clipboard.
#
# Scroll the scrollback with:  <prefix> [   then PageUp / arrows   (q to exit).

# Terminal owns the mouse -> native selection + Cmd+C / Cmd+V.
set -g mouse off

# On a plain-SSH connection (not mosh), also let tmux's own copy-mode push to
# the system clipboard via OSC 52. Harmlessly ignored over mosh.
set -g set-clipboard on
set -ga terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'

# Roomier scrollback (matters more now that scrolling is keyboard-driven).
set -g history-limit 50000

# --- session persistence across reboots (tmux-resurrect + tmux-continuum) ---
# resurrect: prefix + Ctrl-s to save, prefix + Ctrl-r to restore.
# continuum: auto-saves every 15 min and auto-restores when the tmux server
# starts (i.e. the first `qkvps` after a reboot brings your windows back). Panes
# come back as shells in their original cwd — Claude is NOT auto-relaunched
# (avoids a memory stampede on boot); reopen it with `claude --resume`.
# Guarded with if-shell so this shared file is a harmless no-op on machines
# without the plugins (e.g. the Mac); the box has them under ~/.tmux/plugins/.
if-shell '[ -f ~/.tmux/plugins/tmux-resurrect/resurrect.tmux ]' 'run-shell ~/.tmux/plugins/tmux-resurrect/resurrect.tmux'
if-shell '[ -f ~/.tmux/plugins/tmux-continuum/continuum.tmux ]' 'run-shell ~/.tmux/plugins/tmux-continuum/continuum.tmux'
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'
